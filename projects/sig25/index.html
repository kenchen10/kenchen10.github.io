---
layout: publication_new
id: sig25
---

<style>
  .cc input[type=number], .cc select, .cc button, .cc textarea {
  font-family: 'Fontin';
  font-size: 13px;
  padding: 5px 8px;
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  outline: none;
  box-sizing: border-box;
}

.cc button {
  color: var(--color-text-primary);
  cursor: pointer;
  /* background: transparent; */
  padding: 5px 12px;
  transition: background 0.15s;
}

.cc button:hover { background: var(--color-background-secondary); }
.cc button:active { transform: scale(0.98); }

input[type=number]:focus, select:focus {
  box-shadow: 0 0 0 2px rgba(100,100,100,0.2);
}
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f9f1f3;
  --color-background-tertiary: #eeede8;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #6b6b6b;
  --color-border-tertiary: rgba(0,0,0,0.12);
  --color-border-secondary: rgba(0,0,0,0.2);
  --font-sans: system-ui, -apple-system, sans-serif;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
}
    .cc { padding: 1rem 0; font-family: 'Fontin'; color: var(--color-text-primary); }
    .controls { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .section-label { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 10px; }
    .param-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; align-items: flex-end; }
    .param-group { display: flex; flex-direction: column; gap: 4px; }
    .param-group label { font-size: 12px; color: var(--color-text-secondary); }
    .param-group input[type=number] { width: 72px; }
    .point-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .point-row input[type=number] { width: 80px; }
    .color-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .tooltip { position: fixed; z-index: 99999; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 10px; font-size: 12px; pointer-events: none; display: none; z-index: 10; white-space: nowrap; }
    .divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 12px 0; }
    select { padding: 4px 8px; font-size: 13px; }
    .baseline-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; display: inline-flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; }
</style>

        <h3>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/jstat/latest/jstat.min.js"></script>
  <script>
  const MODELS = [
    {name: "Virtual Reality (Content-aware)", params: { k1: 9971.3, k2: 0.8466, k3: 0.0005518, k4: 9975.3 }},
    {name: "Virtual Reality (Fixed)", params: { k1: 7897.3, k2: 0.8447, k3: 0.0008151, k4: 7902.3 }},
    {name: "Direct-view Display", params: { k1: 3423.04, k2: 0.685, k3: 0.001384, k4: 3426.64 }},
    {name: "Custom", params: { k1: 7897.3, k2: 0.8447, k3: 0.0008151, k4: 7902.3  }, editable: true}
  ];
  let currentModelIdx = 0;
const COLORS = ['#3266ad','#d85a30','#1d9e75','#9747ff','#e24b4a','#ba7517','#0f6e56','#993556'];
let pointRows = [], rowId = 0;

function getModel() { return MODELS[currentModelIdx]; }

function jodToPPref(jod) {
  const p_A_better = jStat.normal.cdf(jod, 0, 1.4826) * 100;
  console.log(p_A_better)
  const p_pref = (p_A_better*2 - 100) / 100;
  return (p_pref + 1) * 0.5;
}
function fmtPPref(v) {
  const pct = v * 100;
  return pct.toFixed(1) + '%';
}

function jodRaw(contrast, luminance) {
  const p = getModel().params;
  const X = luminance / Math.max(contrast, 1e-9);
  const logY = Math.log10(Math.max(luminance, 1e-6));
  const Z = Math.pow(logY, p.k3) * (p.k1 - p.k2 * Math.sqrt(Math.max(X, 0))) - p.k4;
  return isFinite(Z) ? Z : 0;
}
function getBaselineJOD() {
  return jodRaw(+document.getElementById('base-con').value, +document.getElementById('base-lum').value);
}
function jodDelta(contrast, luminance) { return jodRaw(contrast, luminance) - getBaselineJOD(); }

function updateBaseDisplay() {
  document.getElementById('base-jod-display').textContent = `absolute JOD: ${getBaselineJOD().toFixed(3)}`;
}

function updatePointResults() {
  pointRows.forEach((p, i) => {
    const el = document.getElementById(`point-result-${p.id}`);
    if (!el) return;
    const dj = jodDelta(p.c, p.l);
    const pp = jodToPPref(dj);
    const sign = dj >= 0 ? '+' : '';
    el.textContent = `${sign}${dj.toFixed(2)} JOD  |  ${fmtPPref(pp)} prefer ${p.name} over baseline.`;
    el.style.color = dj >= 0 ? '#185fa5' : '#993c1d';
  });
}

function fmtContrast(v) {
  if (v >= 1e6) return (v/1e6).toFixed(v%1e6===0?0:1)+'M';
  if (v >= 1e3) return (v/1e3).toFixed(v%1e3===0?0:1)+'k';
  return v.toFixed(0);
}

function buildModelSelect() {
  const sel = document.getElementById('model-select');
  sel.innerHTML = '';
  MODELS.forEach((m,i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = m.name; sel.appendChild(o);
  });
}

function onModelChange() {
  currentModelIdx = +document.getElementById('model-select').value;
  renderParamDisplay();
  updateBaseDisplay();
  updatePointResults();
}

function renderParamDisplay() {
  const m = getModel();
  const el = document.getElementById('model-params-display');
  if (m.editable) {
    el.innerHTML = ['k1','k2','k3','k4'].map(k => `
      <div class="param-group"><label>${k}</label>
        <input type="number" value="${m.params[k]}" step="0.001" style="width:68px"
          oninput="MODELS[${currentModelIdx}].params.${k}=+this.value;updateBaseDisplay();updatePointResults()">
      </div>`).join('');
  } else {
    el.innerHTML = ['k1','k2','k3','k4'].map(k =>
      `<div class="param-group"><label>${k}</label>
        <div style="font-size:13px;font-weight:500;padding:6px 0">${m.params[k]}</div>
      </div>`).join('');
  }
}

function addPointRow(c=1000, l=200, name='') {
  pointRows.push({ id: rowId++, c, l, name });
  renderPointRows();
}

function removePoint(id) {
  pointRows = pointRows.filter(p => p.id !== id);
  renderPointRows();
}

function renderPointRows() {
  const el = document.getElementById('points-list');
  el.innerHTML = '';
  pointRows.forEach((p, i) => {
    const color = COLORS[i % COLORS.length];
    const dj = jodDelta(p.c, p.l);
    const pp = jodToPPref(dj);
    const sign = dj >= 0 ? '+' : '';
    const resultColor = dj >= 0 ? '#185fa5' : '#993c1d';
    const div = document.createElement('div');
    div.className = 'point-row';
    div.innerHTML = `
      <span class="color-dot" style="margin-top: 25px; background:${color}"></span>
      <div class="param-group">
        <label style="font-size:11px">Name</label>
        <input type="text" value="${p.name}" placeholder="e.g. OLED TV"
          onchange="pointRows[${i}].name=this.value"
          style="width:110px;padding:4px 7px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md)">
      </div>
      <div class="param-group">
        <label style="font-size:11px">Contrast</label>
        <input type="number" value="${p.c}" step="1" min="1"
          onchange="pointRows[${i}].c=+this.value;updatePointResults()" style="width:90px">
      </div>
      <div class="param-group">
        <label style="font-size:11px">Luminance (cd/m²)</label>
        <input type="number" value="${p.l}" step="10" min="1"
          onchange="pointRows[${i}].l=+this.value;updatePointResults()" style="width:80px">
      </div>
      <div class="point-result" id="point-result-${p.id}" style="margin-top: 25px; color:${resultColor}">${sign}${dj.toFixed(2)} JOD  ·  ${fmtPPref(pp)} pref</div>
      <button onclick="removePoint(${p.id})" style="font-size:11px;padding:2px 6px;align-self:flex-end;margin-bottom:1px">✕</button>`;
    el.appendChild(div);
  });
}

function marchingSquares(grid, nx, ny, level, xScale, yScale, xVals, yVals) {
  const lines = [];
  for (let j=0; j<ny-1; j++) {
    for (let i=0; i<nx-1; i++) {
      const v00=grid[j][i],v10=grid[j][i+1],v01=grid[j+1][i],v11=grid[j+1][i+1];
      const bits=((v00>=level)?8:0)|((v10>=level)?4:0)|((v11>=level)?2:0)|((v01>=level)?1:0);
      if (bits===0||bits===15) continue;
      function lerp(a,b,va,vb){ return Math.abs(vb-va)<1e-9?a:a+(b-a)*(level-va)/(vb-va); }
      const x0=xVals[i],x1=xVals[i+1],y0=yVals[j],y1=yVals[j+1];
      const top=[lerp(x0,x1,v00,v10),y0],bottom=[lerp(x0,x1,v01,v11),y1];
      const left=[x0,lerp(y0,y1,v00,v01)],right=[x1,lerp(y0,y1,v10,v11)];
      const segs={1:[bottom,left],2:[right,bottom],3:[right,left],4:[top,right],
        5:[top,right,bottom,left],6:[top,bottom],7:[top,left],8:[left,top],
        9:[bottom,top],10:[left,bottom,right,top],11:[right,top],
        12:[left,right],13:[bottom,right],14:[left,bottom]};
      const pts=segs[bits]; if(!pts) continue;
      for (let k=0;k<pts.length-1;k+=2)
        lines.push([[xScale(pts[k][0]),yScale(pts[k][1])],[xScale(pts[k+1][0]),yScale(pts[k+1][1])]]);
    }
  }
  return lines;
}

const CB_W=18, CB_GAP=48;
const margin={top:20, right:CB_GAP+CB_W+70, bottom:55, left:75};

function redraw() {
  updateBaseDisplay();
  updatePointResults();
  const res    =+document.getElementById('res').value;
  const cminV  =+document.getElementById('cmin').value;
  const cmaxV  =+document.getElementById('cmax').value;
  const lminV  =+document.getElementById('lmin').value;
  const lmaxV  =+document.getElementById('lmax').value;
  const baseLum=+document.getElementById('base-lum').value;
  const baseCon=+document.getElementById('base-con').value;

  const logCMin=Math.log10(cminV), logCMax=Math.log10(cmaxV);
  const logLMin=Math.log10(lminV), logLMax=Math.log10(lmaxV);

  const W0=document.querySelector('.cc').offsetWidth||700;
  const H0=Math.max(340,Math.round(W0*0.56));
  const W=W0-margin.left-margin.right;
  const H=H0-margin.top-margin.bottom;

  const svg=d3.select('#heatmap').attr('width',W0).attr('height',H0);
  svg.selectAll('*').remove();
  const g=svg.append('g').attr('transform',`translate(${margin.left},${margin.top})`);

  const logCArr=d3.range(res).map(i=>logCMin+(logCMax-logCMin)*i/(res-1));
  const logLArr=d3.range(res).map(i=>logLMin+(logLMax-logLMin)*i/(res-1));
  const xScale=d3.scaleLinear().domain([logCMin,logCMax]).range([0,W]);
  const yScale=d3.scaleLinear().domain([logLMin,logLMax]).range([H,0]);

  const grid=logLArr.map(logL=>logCArr.map(logC=>jodDelta(Math.pow(10,logC),Math.pow(10,logL))));
  const allVals=grid.flat().filter(isFinite);
  const vMin=d3.min(allVals), vMax=d3.max(allVals);
  const absMax=Math.max(Math.abs(vMin),Math.abs(vMax));
  const colorScale=d3.scaleDiverging(d3.interpolateRdBu).domain([-absMax,0,absMax]);

  const cellW=W/(res-1), cellH=H/(res-1);
  for (let j=0;j<res;j++) for (let i=0;i<res;i++) {
    if (!isFinite(grid[j][i])) continue;
    g.append('rect')
      .attr('x',xScale(logCArr[i])-cellW/2).attr('y',yScale(logLArr[j])-cellH/2)
      .attr('width',cellW+0.5).attr('height',cellH+0.5)
      .attr('fill',colorScale(grid[j][i]));
  }

  const nIso=10;
  d3.range(nIso).map(i=>vMin+(vMax-vMin)*(i+0.5)/nIso).forEach(level=>{
    const segs=marchingSquares(grid,res,res,level,xScale,yScale,logCArr,logLArr);
    segs.forEach(s=>g.append('line')
      .attr('x1',s[0][0]).attr('y1',s[0][1]).attr('x2',s[1][0]).attr('y2',s[1][1])
      .attr('stroke','rgba(255,255,255,0.45)').attr('stroke-width',1));
    if (segs.length) {
      const mid=segs[Math.floor(segs.length/2)][0];
      if (mid[0]>10&&mid[0]<W-10&&mid[1]>10&&mid[1]<H-10)
        g.append('text').attr('x',mid[0]).attr('y',mid[1]-3)
          .attr('font-size',9).attr('fill','rgba(255,255,255,0.8)')
          .attr('text-anchor','middle').text(level.toFixed(2));
    }
  });

  const zeroSegs=marchingSquares(grid,res,res,0,xScale,yScale,logCArr,logLArr);
  zeroSegs.forEach(s=>g.append('line')
    .attr('x1',s[0][0]).attr('y1',s[0][1]).attr('x2',s[1][0]).attr('y2',s[1][1])
    .attr('stroke','#222').attr('stroke-width',2));

  const hoverGroup=g.append('g');
  g.append('rect').attr('width',W).attr('height',H).attr('fill','transparent')
    .style('cursor','crosshair')
    .on('mousemove', function(event) {
      const [mx, my] = d3.pointer(event);
      const dj = jodDelta(Math.pow(10, xScale.invert(mx)), Math.pow(10, yScale.invert(my)));
      const pp = jodToPPref(dj);
      const c = Math.pow(10, xScale.invert(mx));
      const l = Math.pow(10, yScale.invert(my));
      const tt = document.getElementById('tooltip');
      tt.style.display = 'block';
      tt.style.left = Math.min(event.clientX + 14, window.innerWidth - tt.offsetWidth - 10) + 'px';
      tt.style.top  = Math.min(event.clientY - 10, window.innerHeight - tt.offsetHeight - 10) + 'px';
      hoverGroup.selectAll('*').remove();
      console.log('client:', event.clientX, event.clientY);
      console.log('page:', event.pageX, event.pageY);
      console.log('innerWidth:', window.innerWidth);
      marchingSquares(grid, res, res, dj, xScale, yScale, logCArr, logLArr).forEach(s =>
        hoverGroup.append('line')
          .attr('x1', s[0][0]).attr('y1', s[0][1]).attr('x2', s[1][0]).attr('y2', s[1][1])
          .attr('stroke', '#fff').attr('stroke-width', 2));
      hoverGroup.append('circle').attr('cx', mx).attr('cy', my).attr('r', 4)
        .attr('fill', 'white').attr('stroke', '#000').attr('stroke-width', 1);
    })
    .on('mouseleave',function(){
      document.getElementById('tooltip').style.display='none';
      hoverGroup.selectAll('*').remove();
    });

  const ptLayer=g.append('g');
  const baseLogC=Math.log10(Math.max(baseCon,1e-6));
  const baseLogL=Math.log10(Math.max(baseLum,1));
  if (baseLogC>=logCMin&&baseLogC<=logCMax&&baseLogL>=logLMin&&baseLogL<=logLMax) {
    const bx=xScale(baseLogC), by=yScale(baseLogL);
    ptLayer.append('rect')
      .attr('x',bx-6).attr('y',by-6).attr('width',12).attr('height',12)
      .attr('fill','#fff').attr('stroke','#222').attr('stroke-width',2)
      .attr('transform',`rotate(45,${bx},${by})`);
    ptLayer.append('text').attr('x',bx+12).attr('y',by+4).attr('font-size',11)
      .attr('fill','#fff').attr('stroke','rgba(0,0,0,0.6)').attr('stroke-width',2)
      .attr('paint-order','stroke').text('baseline');
  }

  pointRows.forEach((pt,i)=>{
    const logC=Math.log10(Math.max(pt.c,1e-6));
    const logL=Math.log10(Math.max(pt.l,1));
    const color=COLORS[i%COLORS.length];
    const dj=jodDelta(pt.c,pt.l);
    const jodStr=`${dj>0?'+':''}${dj.toFixed(2)} JOD`;
    const label=pt.name.trim() ? `${pt.name}: ${jodStr}` : jodStr;
    marchingSquares(grid,res,res,dj,xScale,yScale,logCArr,logLArr).forEach(s=>
      ptLayer.append('line')
        .attr('x1',s[0][0]).attr('y1',s[0][1]).attr('x2',s[1][0]).attr('y2',s[1][1])
        .attr('stroke',color).attr('stroke-width',1.5).attr('stroke-dasharray','4,3').attr('opacity',0.9));
    if (logC>=logCMin&&logC<=logCMax&&logL>=logLMin&&logL<=logLMax){
      const px=xScale(logC), py=yScale(logL);
      ptLayer.append('circle').attr('cx',px).attr('cy',py).attr('r',6)
        .attr('fill',color).attr('stroke','#fff').attr('stroke-width',1.5);
      ptLayer.append('text').attr('x',px+9).attr('y',py+4).attr('font-size',11)
        .attr('fill','#fff').attr('stroke','rgba(0,0,0,0.5)').attr('stroke-width',2)
        .attr('paint-order','stroke').text(label);
    }
  });

  const logCTicks=d3.range(Math.ceil(logCMin),Math.floor(logCMax)+1).filter(v=>v>=logCMin&&v<=logCMax);
  g.append('g').attr('transform',`translate(0,${H})`)
    .call(d3.axisBottom(xScale).tickValues(logCTicks).tickFormat(d=>fmtContrast(Math.pow(10,d))))
    .selectAll('text').attr('font-size',11).attr('dy','1em');

  const logLStep=(logLMax-logLMin)/5;
  const logLTicks=d3.range(0,6).map(i=>+(logLMin+logLStep*i).toFixed(4));
  g.append('g').call(d3.axisLeft(yScale).tickValues(logLTicks).tickFormat(d=>Math.pow(10,d).toFixed(0)))
    .selectAll('text').attr('font-size',11);

  g.append('text').attr('x',W/2).attr('y',H+48).attr('text-anchor','middle')
    .attr('font-size',12).attr('fill','var(--color-text-secondary)').text('Contrast ratio');
  g.append('text').attr('transform','rotate(-90)').attr('x',-H/2).attr('y',-60)
    .attr('text-anchor','middle').attr('font-size',12)
    .attr('fill','var(--color-text-secondary)').text('Peak luminance (cd/m²)');

  const cbX=W+CB_GAP;
  const cbId='cb-grad-'+Date.now();
  const defs=svg.append('defs');
  const grad=defs.append('linearGradient').attr('id',cbId)
    .attr('x1','0%').attr('y1','0%').attr('x2','0%').attr('y2','100%');
  for (let s=0;s<=64;s++) {
    const t=s/64, val=absMax-2*absMax*t;
    grad.append('stop').attr('offset',`${(t*100).toFixed(1)}%`).attr('stop-color',colorScale(val));
  }
  const cbG=svg.append('g').attr('transform',`translate(${margin.left+cbX},${margin.top})`);
  cbG.append('rect').attr('width',CB_W).attr('height',H).attr('fill',`url(#${cbId})`).attr('rx',3);
  const cbScale=d3.scaleLinear().domain([absMax,-absMax]).range([0,H]);
  d3.range(6).forEach(i=>{
    const val=absMax-2*absMax*i/5, y=cbScale(val);
    cbG.append('line').attr('x1',CB_W).attr('y1',y).attr('x2',CB_W+5).attr('y2',y)
      .attr('stroke','var(--color-text-secondary)').attr('stroke-width',0.5);
    cbG.append('text').attr('x',CB_W+8).attr('y',y+4).attr('font-size',10)
      .attr('fill','var(--color-text-secondary)').text(val>0?`+${val.toFixed(1)}`:val.toFixed(1));
  });
  cbG.append('text').attr('x',CB_W+8).attr('y',-6).attr('font-size',11).attr('font-weight',500)
    .attr('fill','var(--color-text-secondary)').text('Positive');
  cbG.append('text').attr('x',CB_W+8).attr('y',H+14).attr('font-size',11).attr('font-weight',500)
    .attr('fill','var(--color-text-secondary)').text('Negative');
  cbG.append('text')
    .attr('transform',`translate(${CB_W+52},${H/2}) rotate(90)`)
    .attr('text-anchor','middle').attr('font-size',12)
    .attr('fill','var(--color-text-secondary)').text('Perceptual Impact (JODs)');
}

window.onload = () => {
  buildModelSelect();
  renderParamDisplay();
  updateBaseDisplay();
  addPointRow(1300, 400, 'DisplayHDR 400');
  addPointRow(50000, 1400, 'DisplayHDR 1,400');
  setTimeout(redraw, 100);
};
window.redraw = redraw;
window.addPointRow = addPointRow;
window.removePoint = removePoint;
window.onModelChange = onModelChange;
window.updateBaseDisplay = updateBaseDisplay;
window.updatePointResults = updatePointResults;
</script>
